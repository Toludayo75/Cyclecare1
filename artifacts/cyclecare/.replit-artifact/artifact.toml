kind = "mobile"
previewPath = "/"
title = "CycleCare"
version = "1.0.0"
id = "artifacts/cyclecare"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20151

[services.development]
run = "pnpm --filter @workspace/cyclecare run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cyclecare", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/cyclecare", "run", "serve" ]

[services.env]
PORT = "20151"
BASE_PATH = "/"
